services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: localdb
      POSTGRES_DB: nakama
    ports:
      - "5432:5432"

  nakama:
    image: heroiclabs/nakama:latest
    depends_on:
      - postgres
    volumes:
      - ./nakama-server/modules:/nakama/data/modules
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - |
        sleep 5

        /nakama/nakama migrate up \
          --database.address postgres://root:localdb@postgres:5432/nakama?sslmode=disable

        exec /nakama/nakama \
          --name nakama1 \
          --database.address postgres://root:localdb@postgres:5432/nakama?sslmode=disable \
          --logger.level DEBUG \
          --runtime.path /nakama/data/modules \
          --runtime.js_entrypoint match.js \
          --session.token_expiry_sec 7200 \
          --socket.server_key defaultkey
    ports:
      - "7350:7350"
      - "7351:7351"